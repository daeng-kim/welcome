<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Daily Data Report</title>

<!--
  ※ 실제 사용 시 아래 경로를 RealGrid 라이선스/스크립트 실제 경로로 교체하세요.
  <link rel="stylesheet" href="/realgrid/css/default_blue.css">
  <script src="/realgrid/realgridjs-lic.js"></script>
  <script src="/realgrid/realgridjs.min.js"></script>
  <script src="/realgrid/realgridjs-api.js"></script>
-->

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Malgun Gothic', '맑은 고딕', Arial, sans-serif;
    font-size: 12px;
    background: #f0f0f0;
    color: #222;
  }

  /* ── 상단 타이틀바 ── */
  .title-bar {
    background: #1e3a5f;
    color: #fff;
    padding: 6px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    font-weight: bold;
  }
  .title-bar .btn-group button {
    background: #e8e8e8;
    border: 1px solid #aaa;
    border-radius: 2px;
    padding: 3px 10px;
    font-size: 11px;
    cursor: pointer;
    margin-left: 4px;
  }

  /* ── 검색 필터 영역 ── */
  .filter-area {
    background: #f5f5f5;
    border: 1px solid #ccc;
    margin: 6px;
    padding: 8px 12px;
    border-radius: 2px;
  }
  .filter-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 5px;
    flex-wrap: wrap;
  }
  .filter-row:last-child { margin-bottom: 0; }
  .filter-label {
    font-size: 11px;
    color: #444;
    white-space: nowrap;
    font-weight: bold;
  }
  .filter-row input[type="text"],
  .filter-row select {
    height: 22px;
    border: 1px solid #aaa;
    border-radius: 2px;
    padding: 0 4px;
    font-size: 11px;
    font-family: inherit;
    min-width: 90px;
  }
  .radio-group { display: flex; flex-direction: column; gap: 2px; }
  .radio-group label { display: flex; align-items: center; gap: 4px; font-size: 11px; }

  /* ── 탭 ── */
  .tab-area {
    margin: 0 6px 4px;
    display: flex;
    gap: 2px;
  }
  .tab-btn {
    background: #e0e0e0;
    border: 1px solid #bbb;
    border-bottom: none;
    border-radius: 3px 3px 0 0;
    padding: 5px 18px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    color: #555;
  }
  .tab-btn.active {
    background: #fff;
    color: #1e3a5f;
    font-weight: bold;
    border-color: #999;
  }

  /* ── 그리드 컨테이너 ── */
  .grid-wrap {
    margin: 0 6px 6px;
    border: 1px solid #999;
    background: #fff;
  }
  #realgridDiv {
    width: 100%;
    height: calc(100vh - 220px);
    min-height: 400px;
  }

  /* ── ColorType 별 행 스타일 (RealGrid styleCallback 대신 CSS로 미리 정의) ── */
  /*
    A = 굵은 헤더 (양품률, 시간가동률 등) - 배경 약간 어둡게
    B = 서브헤더 (Melting, FDM, BOD, Summary 등) - 중간 배경
    C = 일반 행
    D = 들여쓰기 행 (- Inline, -Offline 등)
  */
</style>
</head>
<body>

<!-- 타이틀 -->
<div class="title-bar">
  <span>⬛ Daily Data Report(MB_B01_daily_data_report)</span>
  <div class="btn-group">
    <button>조회</button>
    <button>내려받기</button>
    <button>닫기</button>
  </div>
</div>

<!-- 검색 필터 -->
<div class="filter-area">
  <div class="filter-row">
    <div class="radio-group">
      <label><input type="radio" name="mode" checked> In + Offline</label>
      <label><input type="radio" name="mode"> Inline</label>
      <label><input type="radio" name="mode"> Offline</label>
    </div>
    <span class="filter-label">조회기간</span>
    <input type="text" value="2026/05/11" style="width:90px">
    <span>~</span>
    <input type="text" value="2026/05/11" style="width:90px">
    <span class="filter-label">Tank</span>
    <select><option>전체</option></select>
    <span class="filter-label">Gen</span>
    <select><option>전체</option></select>
    <span class="filter-label">단위</span>
    <select><option>SQFT/%</option></select>
    <span class="filter-label">양산구분</span>
    <select><option>양산</option></select>
  </div>
  <div class="filter-row">
    <span class="filter-label" style="margin-left:50px">회사</span>
    <select><option>전체</option></select>
    <span class="filter-label" style="margin-left:20px">조성</span>
    <select><option>전체</option></select>
    <span class="filter-label" style="margin-left:20px">두께</span>
    <select><option>전체</option></select>
  </div>
</div>

<!-- 탭 -->
<div class="tab-area">
  <button class="tab-btn active">Tank 요약</button>
  <button class="tab-btn">Line 요약</button>
  <button class="tab-btn">재작업 요약</button>
</div>

<!-- 그리드 -->
<div class="grid-wrap">
  <div id="realgridDiv"></div>
</div>

// ================================================================

// D열(GBN_LOSS_CODE)의 그룹 순서는 데이터에서 직접 읽히는 순서가 아니라
// 코드에 명시된 GROUP_ORDER로 결정됩니다:
//
//  A40  → 양품률       (C_CHK=1: 체크박스로 하위 행 접기/펼치기 가능)
//  Z25  → 시간가동률   (C_CHK=1: 체크박스 있음)
//  Z30  → 성능가동률   (C_CHK=1: 체크박스 있음)
//  D10  → Melting 종합불량률【A】  (C_FLAG=1: 굵은 헤더)
//  D11  → FDM 종합불량률【B】
//  D12  → BOD 종합불량률【C】
//  D17  → Sample 종합불량률【D】
//  D101 → Forming 종합불량률【B+C+D】 (Summary)
//  D20  → 용해성형G 종합불량률【A+B】  (Summary)
//  D30  → 용해성형 종합불량률【A+B+C+D】(Summary)
//  Z91~Z96 → BIDP (총 Flow 면적, Bead 면적, Bead Utilization 등)
//  A10  → 조업률
//  A20  → 설비종합효률 / 총 가동률
//
// "양품률이 맨 앞에 나오는 이유": 데이터 소스 자체에는 순서가 없고,
// 그리드를 그릴 때 GROUP_ORDER 맵으로 정렬하기 때문입니다.
// 데이터 DB에서는 A40 코드가 양품률 그룹이며, 표시 순서를 1번으로 지정한 것입니다.

// ================================================================

// ================================================================
// ④ 그룹 순서 정렬 + VIEW_SEQ 정렬
// ================================================================
RAW_DATA.sort((a, b) => {
  const ga = GROUP_ORDER[a.gbn] ?? 99;
  const gb = GROUP_ORDER[b.gbn] ?? 99;
  if (ga !== gb) return ga - gb;
  return (a.seq || 0) - (b.seq || 0);
});

// ================================================================
// ⑤ 그룹별 collapse 상태 관리
//    cChk=1인 그룹(양품률,시간가동률,성능가동률)은 체크박스로 접기/펼치기
//    cFlag=1인 그룹(Melting,FDM,BOD,Sample)은 헤더 클릭으로 접기/펼치기
// ================================================================
const collapseState = {};   // gbn -> true(접힘)/false(펼침)

// 접기/펼치기 대상 그룹 (체크박스 있는 그룹)
const COLLAPSIBLE_GROUPS = new Set(
  RAW_DATA.filter(r => r.cChk === '1').map(r => r.gbn)
);
// cFlag=1 헤더가 있는 서브그룹도 접기 가능
const SUBFLAG_GROUPS = new Set(
  RAW_DATA.filter(r => r.cFlag === '1' && r.cChk !== '1').map(r => r.gbn)
);

// ================================================================
// ⑥ RealGrid 초기화
// ================================================================
window.onload = function () {
  // RealGrid가 로드되지 않은 경우 폴백 테이블 렌더링
  if (typeof RealGridJS === 'undefined') {
    renderFallbackTable();
    return;
  }

  RealGridJS.setRootContext('/realgrid/scripts');
  initRealGrid();
};

function initRealGrid() {
  const dataProvider = new RealGridJS.LocalDataProvider();
  const gridView = new RealGridJS.GridView('realgridDiv');
  gridView.setDataSource(dataProvider);

  // ── 필드 정의 ──────────────────────────────────────────────────
  const fields = [
    { fieldName: 'gbn' },
    { fieldName: 'seq', dataType: 'number' },
    { fieldName: 'title' },
    { fieldName: 'unit' },
    { fieldName: 'cFlag' },
    { fieldName: 'cChk' },
    { fieldName: 'colorType' },
    { fieldName: '합계' },
    ...TANK_COLS.slice(1).map(tc => ({ fieldName: tc }))
  ];
  dataProvider.setFields(fields);

  // ── 컬럼 정의 ──────────────────────────────────────────────────
  const columns = [
    {
      name: 'chkCol',
      fieldName: 'cChk',
      header: { text: '' },
      width: 28,
      editable: false,
      renderer: { type: 'html' },
      styleCallback: function (grid, dataCell) {
        return { styleName: 'center-cell' };
      }
    },
    {
      name: 'titleCol',
      fieldName: 'title',
      header: { text: 'Title' },
      width: 200,
      editable: false,
    },
    {
      name: 'unitCol',
      fieldName: 'unit',
      header: { text: '단위' },
      width: 60,
      editable: false,
      styles: { textAlignment: 'center' }
    },
    {
      name: '합계',
      fieldName: '합계',
      header: { text: '합계' },
      width: 100,
      editable: false,
      styles: { textAlignment: 'far' }
    },
    ...TANK_COLS.slice(1).map(tc => ({
      name: tc,
      fieldName: tc,
      header: { text: tc },
      width: 100,
      editable: false,
      styles: { textAlignment: 'far' }
    }))
  ];
  gridView.setColumns(columns);

  // ── 디스플레이 옵션 ────────────────────────────────────────────
  gridView.setDisplayOptions({
    rowHeight: 22,
    columnMovable: false,
    columnResizable: true,
    fitStyle: 'none',
  });
  gridView.setFixedOptions({ colCount: 3 });  // Title, 단위, 합계 고정
  gridView.header.height = 30;
  gridView.setFooter({ visible: false });
  gridView.setStateBar({ visible: false });
  gridView.setCheckBar({ visible: false });  // 기본 체크바 숨김 (커스텀 체크 사용)

  // ── styleCallback: colorType에 따른 행 스타일 ──────────────────
  gridView.onGetCellStyle = function (grid, index) {
    const row = grid.getValues(index.itemIndex);
    if (!row) return null;
    const color = row.colorType;
    const col = index.column;

    // 그룹 헤더 행 (A = 양품률/시간가동률/성능가동률 헤더)
    if (color === 'A') {
      return {
        background: '#dce6f1',
        fontBold: true,
        foreground: '#1e3a5f',
      };
    }
    // 서브헤더 행 (B = Melting/FDM/BOD/Summary)
    if (color === 'B') {
      return {
        background: '#e8eef6',
        fontBold: true,
        foreground: '#2c4a70',
      };
    }
    // 들여쓰기 행 (D = –Inline, –Offline)
    if (color === 'D') {
      return {
        foreground: '#555',
        background: '#fafafa',
      };
    }
    // 일반 행 (C)
    return { background: '#ffffff' };
  };

  // ── 데이터 로드 ────────────────────────────────────────────────
  const gridRows = buildVisibleRows();
  dataProvider.setJsonRows(gridRows, 'gbn,seq,title,unit,cFlag,cChk,colorType,합계,' + TANK_COLS.slice(1).join(','));
  gridView.refresh();

  // ── 체크박스 클릭 처리 (cChk=1 그룹 접기/펼치기) ──────────────
  gridView.onCellClicked = function (grid, clickData) {
    const row = grid.getValues(clickData.itemIndex);
    if (!row) return;
    const gbn = row.gbn;

    // 체크박스 컬럼 클릭 + cChk=1
    if (clickData.column === 'chkCol' && row.cChk === '1') {
      collapseState[gbn] = !collapseState[gbn];
      reloadGrid(dataProvider, gridView);
      return;
    }

    // cFlag=1 서브그룹 헤더 클릭 (Melting, FDM, BOD, Sample) → 해당 그룹 접기
    if (row.cFlag === '1' && row.cChk !== '1') {
      collapseState[gbn] = !collapseState[gbn];
      reloadGrid(dataProvider, gridView);
    }
  };

  // ── 셀 렌더링: 체크박스 컬럼 커스텀 ──────────────────────────
  gridView.onGetCellContent = function (grid, index, value) {
    if (index.column !== 'chkCol') return value;
    const row = grid.getValues(index.itemIndex);
    if (!row || row.cChk !== '1') return '';
    const collapsed = collapseState[row.gbn] || false;
    return collapsed ? '▶' : '▼';  // 접힘/펼침 아이콘
  };
}

// 보여줄 행 필터링 (collapse 상태 반영)
function buildVisibleRows() {
  return RAW_DATA.filter(row => {
    const gbn = row.gbn;
    // 헤더 행은 항상 표시
    if (row.cChk === '1' || (row.cFlag === '1' && row.cChk !== '1')) return true;
    // 해당 그룹이 접혀 있으면 하위 행 숨김
    if (collapseState[gbn]) return false;
    return true;
  });
}

function reloadGrid(dataProvider, gridView) {
  const visible = buildVisibleRows();
  dataProvider.setJsonRows(visible, 'gbn,seq,title,unit,cFlag,cChk,colorType,합계,' + TANK_COLS.slice(1).join(','));
  gridView.refresh();
}

// ================================================================
// ⑦ RealGrid 미설치 환경 폴백: 순수 HTML 테이블로 렌더링
//    (RealGrid 라이선스 없어도 구조 확인 가능)
// ================================================================
function renderFallbackTable() {
  const container = document.getElementById('realgridDiv');
  container.style.overflow = 'auto';

  const displayRows = buildVisibleRows();

  let html = `
  <table style="border-collapse:collapse;font-size:11px;width:100%;table-layout:fixed;">
    <colgroup>
      <col style="width:28px">
      <col style="width:200px">
      <col style="width:58px">
      ${TANK_COLS.map(() => '<col style="width:100px">').join('')}
    </colgroup>
    <thead>
      <tr style="background:#2c4a70;color:#fff;position:sticky;top:0;z-index:10;">
        <th style="border:1px solid #4a7ab5;padding:4px 2px;text-align:center;"></th>
        <th style="border:1px solid #4a7ab5;padding:4px 6px;text-align:center;">Title</th>
        <th style="border:1px solid #4a7ab5;padding:4px 2px;text-align:center;">단위</th>
        ${TANK_COLS.map(tc => `<th style="border:1px solid #4a7ab5;padding:4px 4px;text-align:center;">${tc}</th>`).join('')}
      </tr>
    </thead>
    <tbody>
  `;

  for (const row of displayRows) {
    const color = row.color;
    let rowBg = '#fff';
    let fontWeight = 'normal';
    let fontColor = '#222';
    let titlePad = '6px';

    if (color === 'A') { rowBg = '#dce6f1'; fontWeight = 'bold'; fontColor = '#1e3a5f'; }
    else if (color === 'B') { rowBg = '#e8eef6'; fontWeight = 'bold'; fontColor = '#2c4a70'; }
    else if (color === 'D') { rowBg = '#fafafa'; fontColor = '#555'; titlePad = '16px'; }

    const collapsed = collapseState[row.gbn] || false;
    const isCheckRow = row.cChk === '1';
    const isFlagRow = row.cFlag === '1' && !isCheckRow;

    // 체크 아이콘
    let chkCell = '';
    if (isCheckRow) {
      chkCell = `<td style="border:1px solid #ccc;text-align:center;cursor:pointer;background:${rowBg};color:${fontColor};font-weight:bold;"
        onclick="toggleGroup('${row.gbn}')">${collapsed ? '▶' : '▼'}</td>`;
    } else if (isFlagRow) {
      chkCell = `<td style="border:1px solid #ccc;text-align:center;cursor:pointer;background:${rowBg};"
        onclick="toggleGroup('${row.gbn}')">◆</td>`;
    } else {
      chkCell = `<td style="border:1px solid #ccc;background:${rowBg};"></td>`;
    }

    const titleClick = isFlagRow ? `onclick="toggleGroup('${row.gbn}')" style="cursor:pointer;"` : '';

    const vals = TANK_COLS.map(tc => {
      const v = row[tc] ?? '';
      return `<td style="border:1px solid #ccc;padding:3px 6px;text-align:right;background:${rowBg};color:${fontColor};font-weight:${fontWeight};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${v}</td>`;
    }).join('');

    html += `
    <tr>
      ${chkCell}
      <td ${titleClick} style="border:1px solid #ccc;padding:3px ${titlePad};background:${rowBg};color:${fontColor};font-weight:${fontWeight};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${row.title}</td>
      <td style="border:1px solid #ccc;padding:3px 4px;text-align:center;background:${rowBg};color:${fontColor};font-size:10px;">${row.unit}</td>
      ${vals}
    </tr>`;
  }

  html += '</tbody></table>';
  container.innerHTML = html;
}

// 폴백 테이블의 그룹 접기/펼치기
function toggleGroup(gbn) {
  collapseState[gbn] = !collapseState[gbn];
  renderFallbackTable();
}
</script>

</html>
