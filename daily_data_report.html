<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Daily Data Report</title>
<!--
  실제 사용 시 아래 RealGrid 스크립트 경로를 맞춰주세요.
  <link rel="stylesheet" href="/realgrid/css/default_blue.css">
  <script src="/realgrid/realgridjs-lic.js"></script>
  <script src="/realgrid/realgridjs.min.js"></script>
  <script src="/realgrid/realgridjs-api.js"></script>
-->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic','맑은 고딕',Arial,sans-serif; font-size:12px; background:#f0f0f0; color:#222; }
.title-bar { background:#1e3a5f; color:#fff; padding:6px 14px; display:flex; align-items:center; justify-content:space-between; font-size:13px; font-weight:bold; }
.title-bar .btn-group button { background:#e8e8e8; border:1px solid #aaa; border-radius:2px; padding:3px 10px; font-size:11px; cursor:pointer; margin-left:4px; }
.filter-area { background:#f5f5f5; border:1px solid #ccc; margin:6px; padding:8px 12px; border-radius:2px; }
.filter-row { display:flex; align-items:center; gap:10px; margin-bottom:5px; flex-wrap:wrap; }
.filter-row:last-child { margin-bottom:0; }
.filter-label { font-size:11px; color:#444; white-space:nowrap; font-weight:bold; }
.filter-row input[type="text"], .filter-row select { height:22px; border:1px solid #aaa; border-radius:2px; padding:0 4px; font-size:11px; font-family:inherit; min-width:90px; }
.radio-group { display:flex; flex-direction:column; gap:2px; }
.radio-group label { display:flex; align-items:center; gap:4px; font-size:11px; }
.tab-area { margin:0 6px 4px; display:flex; gap:2px; }
.tab-btn { background:#e0e0e0; border:1px solid #bbb; border-bottom:none; border-radius:3px 3px 0 0; padding:5px 18px; font-size:12px; cursor:pointer; font-family:inherit; color:#555; }
.tab-btn.active { background:#fff; color:#1e3a5f; font-weight:bold; border-color:#999; }
.grid-wrap { margin:0 6px 6px; border:1px solid #999; background:#fff; }
#realgridDiv { width:100%; height:calc(100vh - 222px); min-height:400px; }

/* 폴백 테이블 */
.fb-wrap { width:100%; height:calc(100vh - 222px); overflow:auto; }
.fb-table { border-collapse:collapse; font-size:11px; width:max-content; }
.fb-table th { background:#2c4a70; color:#fff; border:1px solid #4a7ab5; padding:4px 6px; text-align:center; white-space:nowrap; position:sticky; top:0; z-index:10; }
.fb-table th.sticky-0 { position:sticky; top:0; left:0;   z-index:20; width:28px; }
.fb-table th.sticky-1 { position:sticky; top:0; left:28px; z-index:20; min-width:185px; }
.fb-table th.sticky-2 { position:sticky; top:0; left:213px;z-index:20; width:58px; }
.fb-table td { border:1px solid #ddd; padding:2px 6px; white-space:nowrap; }
.fb-table td.sticky-0 { position:sticky; left:0;   z-index:5; text-align:center; cursor:pointer; width:28px; }
.fb-table td.sticky-1 { position:sticky; left:28px; z-index:5; min-width:185px; overflow:hidden; text-overflow:ellipsis; }
.fb-table td.sticky-2 { position:sticky; left:213px;z-index:5; text-align:center; font-size:10px; width:58px; }
.fb-table td.val-cell { text-align:right; min-width:115px; }
.row-A { background:#dce6f1 !important; font-weight:bold; color:#1e3a5f; }
.row-B { background:#e8eef6 !important; font-weight:bold; color:#2c4a70; }
.row-C { background:#ffffff !important; color:#222; }
.row-D { background:#fafafa !important; color:#666; }
#loadingMsg { padding:30px; font-size:14px; color:#666; text-align:center; }
</style>
</head>
<body>

<div class="title-bar">
  <span>⬛ Daily Data Report(MB_B01_daily_data_report)</span>
  <div class="btn-group"><button>조회</button><button>내려받기</button><button>닫기</button></div>
</div>

<div class="filter-area">
  <div class="filter-row">
    <div class="radio-group">
      <label><input type="radio" name="mode" checked> In + Offline</label>
      <label><input type="radio" name="mode"> Inline</label>
      <label><input type="radio" name="mode"> Offline</label>
    </div>
    <span class="filter-label">조회기간</span>
    <input type="text" value="2026/05/11" style="width:90px"> ~
    <input type="text" value="2026/05/11" style="width:90px">
    <span class="filter-label">Tank</span><select><option>전체</option></select>
    <span class="filter-label">Gen</span><select><option>전체</option></select>
    <span class="filter-label">단위</span><select><option>SQFT/%</option></select>
    <span class="filter-label">양산구분</span><select><option>양산</option></select>
  </div>
  <div class="filter-row">
    <span class="filter-label" style="margin-left:54px">회사</span><select><option>전체</option></select>
    <span class="filter-label">조성</span><select><option>전체</option></select>
    <span class="filter-label">두께</span><select><option>전체</option></select>
  </div>
</div>

<div class="tab-area">
  <button class="tab-btn active">Tank 요약</button>
  <button class="tab-btn">Line 요약</button>
  <button class="tab-btn">재작업 요약</button>
</div>

<div class="grid-wrap">
  <div id="realgridDiv"><div id="loadingMsg">⏳ raw_data.json 로딩 중...</div></div>
</div>

<script>
// ================================================================
// 【그룹 표시 순서 - D열(GBN_LOSS_CODE) 기준】
//
// 양품률(A40)이 맨 앞에 오는 이유:
//   Raw 데이터 자체에는 표시 순서 정보가 없습니다.
//   GROUP_ORDER 맵에서 'A40'을 순서 1번으로 지정했기 때문입니다.
//   이 순서는 화면 기획/비즈니스 로직에서 결정된 것이며,
//   DB나 엑셀 원본에는 없는 정보입니다.
//
// 【E열(세부항목) 순서 - VIEW_SEQ 기준】
//   같은 GBN_LOSS_CODE 그룹 내에서 VIEW_SEQ 오름차순으로 정렬됩니다.
//   VIEW_SEQ = 0 인 행이 그룹의 헤더(대표값) 행입니다.
// ================================================================
const GROUP_ORDER = {
  'A40':  1,   // 양품률
  'Z25':  2,   // 시간가동률
  'Z30':  3,   // 성능가동률
  'D10':  4,   // Melting 종합불량률【A】
  'D11':  5,   // FDM 종합불량률【B】
  'D12':  6,   // BOD 종합불량률【C】
  'D17':  7,   // Sample 종합불량률【D】
  'D101': 8,   // Forming 종합불량률【B+C+D】
  'D20':  9,   // 용해성형G 종합불량률【A+B】
  'D30':  10,  // 용해성형 종합불량률【A+B+C+D】
  'Z91':  11,  'Z92': 12, 'Z93': 13,
  'Z94':  14,  'Z95': 15, 'Z96': 16,
  'A10':  17,  'A20': 18,
};

// Tank 컬럼 표시 순서
const TANK_ORDER = [
  '합계',
  'KN01(SizeMix)', 'KN02(SizeMix)', 'KN04(G850)',
  'KN06(SizeMix)', 'KN07(SizeMix)', 'KN09(SizeMix)', 'KN11(SizeMix)',
  'KN12(G860)',    'KN13(SizeMix)', 'KN14(SizeMix)', 'KN15(SizeMix)',
  'KN17(CBG2)',    'KN18(G800)',
];

// 접기/펼치기 상태 (gbn → true=접힘)
const collapseState = {};

// 피벗된 전체 데이터 (원본 보존용)
let PIVOT_DATA = [];

// ================================================================
// 핵심 함수: Raw JSON (Long format) → 피벗 (Wide format)
//
// 입력 (1764행 Long format):
//   { tankCode:'합계', gbnLossCode:'A40', viewSeq:0, remark:'양품률', val:'90.53', ... }
//   { tankCode:'KN01(SizeMix)', gbnLossCode:'A40', viewSeq:0, remark:'양품률', val:'93.92', ... }
//   { tankCode:'KN02(SizeMix)', gbnLossCode:'A40', viewSeq:0, remark:'양품률', val:'97.13', ... }
//   ... (14개 Tank × 같은 행 = 14행이 1행으로 합쳐짐)
//
// 출력 (96행 Wide format):
//   { gbn:'A40', seq:0, title:'양품률', 합계:'90.53', 'KN01(SizeMix)':'93.92', ... }
// ================================================================
function pivotRawData(rawRows) {
  const rowMap = new Map();

  for (const row of rawRows) {
    // 피벗 키: gbnLossCode + viewSeq + remark 조합으로 행 식별
    // (같은 항목의 여러 Tank가 이 키로 묶임)
    const key = `${row.gbnLossCode}||${row.viewSeq}||${row.remark}`;

    if (!rowMap.has(key)) {
      // 행 메타 정보 초기 세팅
      rowMap.set(key, {
        gbn:     row.gbnLossCode,
        seq:     row.viewSeq,
        lossGbn: row.lossGbn,
        title:   row.remark,
        unit:    row.unit,
        cFlag:   row.cFlag,
        cChk:    row.cChk,
        color:   row.colorType,
      });
    }

    // tankCode를 컬럼명으로 사용해서 val 값 저장
    rowMap.get(key)[row.tankCode] = row.val;
  }

  // 그룹 순서 → VIEW_SEQ 순 정렬
  return Array.from(rowMap.values()).sort((a, b) => {
    const ga = GROUP_ORDER[a.gbn] ?? 99;
    const gb = GROUP_ORDER[b.gbn] ?? 99;
    return ga !== gb ? ga - gb : a.seq - b.seq;
  });
}

// 접기/펼치기 상태 반영한 표시 행 반환
function getVisibleRows() {
  return PIVOT_DATA.filter(row => {
    // cChk=1: 체크박스 그룹 헤더 (양품률/시간가동률/성능가동률) → 항상 표시
    if (row.cChk === '1') return true;
    // cFlag=1: 서브그룹 헤더 (Melting/FDM/BOD/Sample) → 항상 표시
    if (row.cFlag === '1') return true;
    // 그 외 행: 해당 그룹이 접혀있으면 숨김
    return !collapseState[row.gbn];
  });
}

// ================================================================
// 데이터 로드 → 피벗 변환 → 그리드 렌더링
// ================================================================
fetch('raw_data.json')
  .then(res => {
    if (!res.ok) throw new Error('파일 없음');
    return res.json();
  })
  .then(rawRows => {
    console.log(`✅ Raw 로드: ${rawRows.length}행`);
    PIVOT_DATA = pivotRawData(rawRows);
    console.log(`✅ 피벗 완료: ${PIVOT_DATA.length}행`);

    if (typeof RealGridJS !== 'undefined') {
      initRealGrid();
    } else {
      renderFallbackTable();
    }
  })
  .catch(err => {
    document.getElementById('loadingMsg').innerHTML =
      `<span style="color:red">⚠️ raw_data.json 로드 실패: ${err.message}<br>
      HTML 파일과 같은 폴더에 raw_data.json을 두거나,<br>
      실제 API 엔드포인트로 fetch URL을 변경하세요.</span>`;
  });

// ================================================================
// RealGrid 초기화
// ================================================================
function initRealGrid() {
  RealGridJS.setRootContext('/realgrid/scripts');

  const dp = new RealGridJS.LocalDataProvider();
  const gv = new RealGridJS.GridView('realgridDiv');
  gv.setDataSource(dp);

  // 필드
  dp.setFields([
    { fieldName: 'gbn' },
    { fieldName: 'seq', dataType: 'number' },
    { fieldName: 'lossGbn' },
    { fieldName: 'title' },
    { fieldName: 'unit' },
    { fieldName: 'cFlag' },
    { fieldName: 'cChk' },
    { fieldName: 'color' },
    ...TANK_ORDER.map(t => ({ fieldName: t })),
  ]);

  // 컬럼
  gv.setColumns([
    { name:'toggleCol', fieldName:'cChk',  header:{ text:'' },     width:28,  editable:false, styles:{ textAlignment:'center' } },
    { name:'titleCol',  fieldName:'title', header:{ text:'Title' }, width:200, editable:false },
    { name:'unitCol',   fieldName:'unit',  header:{ text:'단위' },  width:58,  editable:false, styles:{ textAlignment:'center' } },
    ...TANK_ORDER.map(t => ({
      name: t, fieldName: t,
      header: { text: t },
      width: t === '합계' ? 120 : 110,
      editable: false,
      styles: { textAlignment: 'far' },
    })),
  ]);

  gv.setDisplayOptions({ rowHeight:22, columnMovable:false, columnResizable:true });
  gv.setFixedOptions({ colCount: 3 });   // Title, 단위, 합계 고정
  gv.header.height = 30;
  gv.setFooter({ visible: false });
  gv.setStateBar({ visible: false });
  gv.setCheckBar({ visible: false });

  // 행 스타일
  gv.onGetCellStyle = function(grid, index) {
    const row = grid.getValues(index.itemIndex);
    if (!row) return null;
    switch (row.color) {
      case 'A': return { background:'#dce6f1', fontBold:true, foreground:'#1e3a5f' };
      case 'B': return { background:'#e8eef6', fontBold:true, foreground:'#2c4a70' };
      case 'D': return { background:'#fafafa', foreground:'#777' };
      default:  return { background:'#ffffff' };
    }
  };

  // 토글 아이콘
  gv.onGetCellContent = function(grid, index, value) {
    if (index.column !== 'toggleCol') return value;
    const row = grid.getValues(index.itemIndex);
    if (!row) return '';
    if (row.cChk === '1') return collapseState[row.gbn] ? '▶' : '▼';
    if (row.cFlag === '1') return collapseState[row.gbn] ? '▷' : '▽';
    return '';
  };

  // 클릭 → 접기/펼치기
  gv.onCellClicked = function(grid, clickData) {
    const row = grid.getValues(clickData.itemIndex);
    if (!row) return;
    const isHeader = row.cChk === '1' || row.cFlag === '1';
    if (!isHeader) return;
    if (clickData.column === 'toggleCol' || clickData.column === 'titleCol') {
      collapseState[row.gbn] = !collapseState[row.gbn];
      reloadRealGrid(dp, gv);
    }
  };

  reloadRealGrid(dp, gv);

  // 전역 참조 (외부에서 재로드 가능)
  window._dp = dp;
  window._gv = gv;
}

function reloadRealGrid(dp, gv) {
  const visible = getVisibleRows();
  const fieldNames = ['gbn','seq','lossGbn','title','unit','cFlag','cChk','color', ...TANK_ORDER];
  dp.setJsonRows(visible, fieldNames.join(','));
  gv.refresh();
}

// ================================================================
// 폴백 테이블 (RealGrid 없을 때 브라우저에서 확인용)
// ================================================================
function renderFallbackTable() {
  const container = document.getElementById('realgridDiv');
  const rows = getVisibleRows();

  let html = `<div class="fb-wrap"><table class="fb-table"><thead><tr>
    <th class="sticky-0"></th>
    <th class="sticky-1">Title</th>
    <th class="sticky-2">단위</th>
    ${TANK_ORDER.map(t => `<th>${t}</th>`).join('')}
  </tr></thead><tbody>`;

  for (const row of rows) {
    const cls       = `row-${row.color}`;
    const isChk     = row.cChk  === '1';
    const isFlag    = row.cFlag === '1' && !isChk;
    const collapsed = collapseState[row.gbn] || false;
    const icon      = isChk  ? (collapsed ? '▶' : '▼')
                    : isFlag ? (collapsed ? '▷' : '▽') : '';
    const indentStyle = row.color === 'D' ? 'padding-left:18px;' : '';
    const clickable   = (isChk || isFlag) ? `onclick="toggle('${row.gbn}')" style="cursor:pointer;${indentStyle}"` : `style="${indentStyle}"`;

    html += `<tr class="${cls}">
      <td class="sticky-0 ${cls}" onclick="toggle('${row.gbn}')">${icon}</td>
      <td class="sticky-1 ${cls}" ${clickable}>${row.title}</td>
      <td class="sticky-2 ${cls}">${row.unit}</td>
      ${TANK_ORDER.map(t => `<td class="val-cell ${cls}">${row[t] ?? ''}</td>`).join('')}
    </tr>`;
  }

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function toggle(gbn) {
  collapseState[gbn] = !collapseState[gbn];
  renderFallbackTable();
}
</script>
</body>
</html>
